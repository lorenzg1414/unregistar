<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>after hours</title>
<!--
  ============================================================
  A liminal point-and-click. Single file, no build step.

  WHERE TO EDIT THINGS:
    - PALETTES ....... colors per scene, near the top of the script
    - ITEMS .......... item names + pixel icons
    - COMBOS ......... item-combination recipes
    - AREAS .......... the whole dependency graph: every hotspot,
                       every exit, every lock/key/flag lives here.
                       Add an area = add an entry here + a draw
                       function in SCENES with the same key.
    - SCENES ......... procedural pixel-art draw function per area
    - FLAVOR ......... idle click flavor text per area

  Save data goes to localStorage when available, otherwise an
  in-memory fallback (works as a claude.ai artifact too).
  ============================================================
-->
<style>
  :root{ --fg:#b8bcb0; --dim:#5c6058; --bg:#0b0c0a; --hl:#9fd8d2; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ background:var(--bg); color:var(--fg); height:100%; }
  body{ font-family:"Courier New",ui-monospace,monospace; display:flex; align-items:center; justify-content:center; padding:8px; }
  #wrap{ width:min(96vw, 860px); user-select:none; -webkit-user-select:none; }
  #frame{ position:relative; border:1px solid #23251f; background:#000; }
  canvas#cv{ display:block; width:100%; aspect-ratio:320/200;
    image-rendering:pixelated; image-rendering:crisp-edges; touch-action:manipulation; cursor:crosshair; }
  canvas#cv.hot{ cursor:pointer; }
  #corner{ position:absolute; top:6px; right:6px; display:flex; gap:6px; opacity:.55; }
  #corner button{ background:#111310; color:var(--dim); border:1px solid #23251f;
    font:inherit; font-size:11px; padding:2px 7px; cursor:pointer; }
  #corner button:hover{ color:var(--fg); }
  #hint{ min-height:15px; font-size:11px; color:var(--dim); padding:4px 2px 0; letter-spacing:.5px; }
  #msg{ min-height:38px; font-size:13px; line-height:1.45; padding:2px 2px 6px; color:var(--fg); }
  #msg.soft{ color:var(--dim); font-style:italic; }
  #inv{ display:flex; gap:6px; flex-wrap:wrap; padding:6px 0 2px; border-top:1px solid #1a1c17; min-height:46px; }
  .slot{ width:38px; height:38px; background:#101208; background:#0f110d; border:1px solid #23251f;
    display:flex; align-items:center; justify-content:center; cursor:pointer; position:relative; }
  .slot canvas{ width:30px; height:30px; image-rendering:pixelated; }
  .slot.sel{ border-color:var(--hl); box-shadow:0 0 0 1px var(--hl); }
  .slot:hover::after{ content:attr(data-name); position:absolute; bottom:calc(100% + 4px); left:0;
    background:#0b0c0a; border:1px solid #23251f; color:var(--fg); font-size:10px; padding:2px 5px; white-space:nowrap; z-index:3; }
  #end{ position:absolute; inset:0; display:none; align-items:center; justify-content:flex-start;
    flex-direction:column; text-align:center; background:transparent; padding:4% 0 2%; }
  #end.show{ display:flex; }
  #end h1{ font-size:clamp(16px,3.4vw,26px); font-weight:normal; letter-spacing:2px; color:#e8e4da;
    text-shadow:0 0 12px rgba(230,220,180,.25); }
  #end .credits{ margin-top:auto; font-size:clamp(8px,1.4vw,11px); color:var(--dim); line-height:1.7; }
  #end button{ margin-top:8px; background:none; border:1px solid #3a3d35; color:var(--dim);
    font:inherit; font-size:11px; padding:4px 12px; cursor:pointer; }
  #end button:hover{ color:var(--fg); }
</style>
</head>
<body>
<div id="wrap">
  <div id="frame">
    <canvas id="cv" width="320" height="200"></canvas>
    <div id="corner">
      <button id="sndBtn" title="ambient sound">&#9834; off</button>
      <button id="rstBtn" title="start over">reset</button>
    </div>
    <div id="end">
      <h1>You found the chicken.</h1>
      <div class="credits">
        &mdash; after hours &mdash;<br><br>
        the chicken &nbsp;........ &nbsp;itself<br>
        the building &nbsp;....... &nbsp;still there<br>
        the field &nbsp;.......... &nbsp;still waiting<br>
        you &nbsp;................ &nbsp;you<br>
      </div>
      <button id="againBtn">begin again</button>
    </div>
  </div>
  <div id="hint">&nbsp;</div>
  <div id="msg" class="soft">The lights are on. Nobody said anything about it.</div>
  <div id="inv"></div>
</div>

<script>
"use strict";
/* ================= storage (localStorage w/ in-memory fallback) ========= */
const store=(()=>{try{localStorage.setItem("__t","1");localStorage.removeItem("__t");return localStorage;}
catch(e){const m={};return{getItem:k=>(k in m?m[k]:null),setItem:(k,v)=>{m[k]=String(v);},removeItem:k=>{delete m[k];}};}})();
const SAVE_KEY="afterhours_save_v1";

/* ================= palettes ============================================= */
/* Edit freely. Hex strings; converted to ints at boot. */
const PALETTES={
  /* CGA-flavored office: black / brown / orange / cyan / grey */
  cga:{ BK:"#0a0a0a", DK:"#241c14", BR:"#6e4420", OR:"#c47830", CY:"#6fd4cf", DC:"#2f5f5c", GY:"#8a8a84", DG:"#3a3a36", WH:"#e8e4da" },
  /* greyer office floors */
  grey:{ BK:"#101012", DG:"#2b2d30", GY:"#63676c", LG:"#989ea3", CY:"#79c6c9", WH:"#dfe3e6", TN:"#8a7a5e", DK:"#1a1b1d" },
  /* muted GBC-meets-VGA nature */
  nature:{ SK1:"#93a7b2", SK2:"#5b6c7e", OL:"#5c6b3f", DO:"#39452c", GL:"#75844f", WG:"#8b8577", DKG:"#20261c", WH:"#d9d9cc", BK:"#11140f" },
  /* roadside dusk */
  dusk:{ S1:"#c98a4e", S2:"#8a5f5a", S3:"#544663", RD:"#45454c", DR:"#232028", GS:"#4c503a", DG2:"#2b2f22", SN:"#7a8288", YL:"#e6c46a", WH:"#e3ded2", BK:"#141218" },
  dark:{ BK:"#050505", ST:"#6e5f34", DS:"#38321e", WM:"#8d825e", CY:"#6fd4cf", WH:"#e8e4da", RD:"#b5493a", OR:"#c47830", DG:"#2a2822" }
};

/* ================= items ================================================ */
const ITEMS={
  crowbar:  {name:"crowbar"},
  feather:  {name:"white feather"},
  string:   {name:"twine"},
  magnet:   {name:"barn magnet"},
  battery:  {name:"D-cell battery"},
  flashlight:{name:"flashlight (dead)"},
  flashlit: {name:"flashlight"},
  opener:   {name:"can opener"},
  coin:     {name:"coin"},
  corncan:  {name:"GOLDEN KERNELS"},
  corn:     {name:"opened kernels"},
  tool:     {name:"magnet on twine"},
  stoneegg: {name:"stone egg"},
  brasskey: {name:"small brass key"}
};
/* 12x12 icons; chars map to ICOLORS */
const ICOLORS={ ".":null, k:"#111", g:"#8a8a84", d:"#4a4a46", w:"#e8e4da", o:"#c47830", y:"#e6c46a", c:"#6fd4cf", r:"#b5493a", b:"#6e4420", t:"#8a7a5e", n:"#39452c" };
const ICONS={
  crowbar:["............","..........dd",".........dgd","........dgd.",".......dgd..","......dgd...",".....dgd....","....dgd.....","...dgd......","..dgd.......",".dgg........",".dd........."],
  feather:["............","........w...",".......ww...","......www...",".....www....","....www.....","...www......","..www.......",".ww.........",".w..........","............","............"],
  string: ["............","...tttt.....","..t....t....","..t....t....","...tttt.....","..t....t....","..t....t....","...tttt.....","....t.......","....t.......","............","............"],
  magnet: ["............","...rrrr.....","..rrrrrr....","..rr..rr....","..rr..rr....","..rr..rr....","..ww..ww....","..ww..ww....","............","............","............","............"],
  battery:["............","....gg......","...gggg.....","...g..g.....","...gyyg.....","...gyyg.....","...g..g.....","...gggg.....","...gggg.....","...gggg.....","............","............"],
  flashlight:["............","..dd........","..dgdd......","..dggddd....","..dggggddd..","..dggggddd..","..dggddd....","..dgdd......","..dd........","............","............","............"],
  flashlit:["............","..dd....y...","..dgdd...y..","..dggddd..y.","..dggggdddyy","..dggggdddyy","..dggddd..y.","..dgdd...y..","..dd....y...","............","............","............"],
  opener: ["............","....g.......","...ggg......","...g.g......","....g.......","....g.......","....gg......","....gg......","....g.......","............","............","............"],
  coin:   ["............","............","....yyy.....","...y...y....","..y..y..y...","..y..y..y...","..y..y..y...","...y...y....","....yyy.....","............","............","............"],
  corncan:["............","...gggg.....","..gggggg....","..gyyyyg....","..gyooyg....","..gyyyyg....","..gggggg....","..gggggg....","..gggggg....","............","............","............"],
  corn:   ["............","...g..g.....","..gggggg....","..gyyyyg....","..gyyyyg....","..gyyyyg....","..gyyyyg....","..gggggg....","...y..y.....","..y..y..y...","............","............"],
  tool:   ["....t.......","....t.......","....t.......","....t.......","....t.......","...rrrr.....","..rrrrrr....","..rr..rr....","..rr..rr....","..ww..ww....","............","............"],
  stoneegg:["............","............","....gg......","...gggg.....","..gggggg....","..gggggg....","..gdgggg....","..gggggg....","...gggg.....","....gg......","............","............"],
  brasskey:["............","............","..yyy.......","..y.y.......","..yyy.......","...y........","...y........","...yy.......","...y........","...yy.......","............","............"]
};
/* item combination recipes: [a, b, result, message] */
const COMBOS=[
  ["flashlight","battery","flashlit","The battery slots in with a satisfying weight. Warm yellow light."],
  ["magnet","string","tool","You knot the twine through the little barn. A fishing rig for metal things."],
  ["corncan","opener","corn","The lid peels back. Golden kernels, still smelling faintly of summer."]
];

/* ================= state ================================================ */
const DEFAULT_STATE=()=>({ area:"hallway", inv:[], sel:null, f:{}, won:false });
let S=DEFAULT_STATE();
function save(){ try{ store.setItem(SAVE_KEY, JSON.stringify({area:S.area,inv:S.inv,f:S.f,won:S.won})); }catch(e){} }
function load(){ try{ const d=JSON.parse(store.getItem(SAVE_KEY)||"null");
  if(d && AREAS[d.area]){ S.area=d.area; S.inv=(d.inv||[]).filter(i=>ITEMS[i]); S.f=d.f||{}; S.won=!!d.won; } }catch(e){} }

const has=i=>S.inv.includes(i);
const F=k=>!!S.f[k];

/* ================= tiny helper API passed to hotspot handlers =========== */
const WRONG=["Nothing happens.","That doesn't want to.","No.","It politely declines.","Not like that."];
const A={
  say(t,soft){ const m=document.getElementById("msg"); m.textContent=t; m.className=soft?"soft":""; },
  give(id,t){ if(!has(id)) S.inv.push(id); if(t)A.say(t); S.sel=null; renderInv(); save(); dirty=true; },
  take(id){ const i=S.inv.indexOf(id); if(i>=0)S.inv.splice(i,1); if(S.sel===id)S.sel=null; renderInv(); save(); },
  set(k,v){ S.f[k]=(v===undefined?true:v); save(); dirty=true; },
  go(area,t){ S.area=area; S.sel=null; S.f["seen_"+area]=true; if(t)A.say(t,true); save(); dirty=true; setAmbience(); },
  wrong(){ A.say(WRONG[Math.floor(Math.random()*WRONG.length)],true); },
  win(){ S.won=true; save(); dirty=true; document.getElementById("end").classList.add("show"); setAmbience(); }
};

/* ================= AREAS: the dependency graph ==========================
   Each hotspot: r:[x,y,w,h] in 320x200 space,
   label (hover hint), vis() optional visibility,
   tap() for a bare click, use:{itemId:fn} for using inventory items.     */
const AREAS={

hallway:{ hotspots:[
  { r:[0,60,26,110], label:"west, toward the stairs", tap:()=>A.go("stairwell","A stairwell. The air is cooler here.") },
  { r:[294,60,26,110], label:"east, a doorway", tap:()=>A.go("breakroom","A break room. The chairs are all pushed in.") },
  { r:[128,64,46,86], label:"a door with wired glass", tap:()=>A.go("cubicles","Cubicles. Rows and rows. All empty.") },
  { r:[212,66,40,84], label:"a door, painted over",
    tap:()=>{ if(F("shortcut")) A.go("field","The painted door swings out onto grass. The hallway hums behind you.");
      else A.say("A door painted the same color as the wall, painted shut. A cold draft under it &mdash; it smells like rain.".replace("&mdash;","—")); },
    use:{ crowbar:()=>A.say("It flexes but won't pry. It has been opened before — from the other side."),
          brasskey:()=>A.say("No keyhole. Just paint.") } },
  { r:[62,72,18,24], label:"a notice", tap:()=>A.say("Sun-bleached notice: \"ALL STAFF — report sightings to Facilities.\" Sightings of what?") }
]},

breakroom:{ hotspots:[
  { r:[0,60,22,110], label:"back to the hallway", tap:()=>A.go("hallway","The hallway again. It goes on a little too long.") },
  { r:[100,54,56,50], label:"a window", tap:()=>A.say("A field, a water tower, dusk. You are on the third floor. There is no third floor on that side.",true) },
  { r:[58,94,10,10], label:"something on the fridge", vis:()=>!F("magnetTaken"),
    tap:()=>{ A.set("magnetTaken"); A.give("magnet","A little magnet shaped like a barn. It comes off the fridge with a tick."); } },
  { r:[22,72,50,88], label:"a fridge", tap:()=>A.say(F("magnetTaken")?"The fridge is dead and empty. A clean rectangle where the magnet was.":"A dead fridge. A tiny barn-shaped magnet clings to the door like it's waiting.") },
  { r:[146,110,20,10], label:"a napkin on the table", tap:()=>A.say("Scrawled on a napkin: \"it only sings when the building wakes.\"") },
  { r:[152,154,38,22], label:"a floor vent",
    tap:()=>{ if(!F("ventOpen")) A.say("A floor-level vent, grille bowed outward. Through the slits: a round shape.");
      else if(!F("batteryTaken")){ A.set("batteryTaken"); A.give("battery","Inside: dust, a dead moth, and one fat D-cell battery."); }
      else A.say("Just dust and the dead moth now.",true); },
    use:{ crowbar:()=>{ if(F("ventOpen")) A.wrong(); else { A.set("ventOpen"); A.say("The grille pops off with a bang that echoes too far."); } } } },
  { r:[238,50,58,110], label:"a vending machine",
    tap:()=>{ if(!F("power")) A.say("A dark vending machine. Row C: GOLDEN KERNELS — 1 coin. The building is asleep.");
      else if(!F("cornBought")) A.say("It hums now. Row C: GOLDEN KERNELS. The coin slot glows faintly.");
      else A.say("Row C is empty. The machine hums to itself.",true); },
    use:{ coin:()=>{ if(!F("power")) A.say("The coin slot is dark. Dead. The whole machine is asleep.");
        else if(F("cornBought")) A.wrong();
        else { A.take("coin"); A.set("cornBought"); A.give("corncan","Clunk. A dented can: GOLDEN KERNELS. Best before a date that hasn't happened yet."); } },
      crowbar:()=>A.say("You could. But it would hear you.") } }
]},

cubicles:{ hotspots:[
  { r:[0,184,320,16], label:"back to the hallway", tap:()=>A.go("hallway","The hallway. Same as you left it. Exactly the same.") },
  { r:[298,60,22,110], label:"a gap in the partitions", tap:()=>A.go("stairwell","Through the maze, a fire door, the stairwell.") },
  { r:[52,56,54,26], label:"marks on the wall", tap:()=>A.say("Dozens of little eggs, scratched into the paint. Over and over. Some are circled.") },
  { r:[150,118,40,16], label:"a desk drawer",
    tap:()=>{ if(!F("drawerOpen")) A.say("A drawer, warped shut. Something rolls inside when you nudge it.");
      else if(!F("drawerLooted")){ A.set("drawerLooted"); A.give("flashlight"); A.give("opener","In the drawer: a rubber flashlight (dead) and a rusted can opener."); }
      else A.say("Paperclips arranged in a small spiral.",true); },
    use:{ crowbar:()=>{ if(F("drawerOpen")) A.wrong(); else { A.set("drawerOpen"); A.say("The drawer shrieks open."); } } } },
  { r:[210,80,30,22], label:"a monitor", tap:()=>A.say("The screensaver stopped mid-bounce years ago.",true) }
]},

stairwell:{ hotspots:[
  { r:[0,184,320,16], label:"the door to the hallway", tap:()=>A.go("hallway","Back in the hallway. The lights notice you, then pretend they didn't.") },
  { r:[240,74,80,100], label:"stairs, going up", tap:()=>A.go("cubicles","Up one flight: an identical floor. The cubicles again. Or ones just like them.") },
  { r:[122,64,46,92], label:"a door marked EXIT",
    tap:()=>{ A.set("shortcut",F("shortcut")); A.go("field","The push-bar gives. Daylight — but soft, and wrong, like it's coming from everywhere."); } },
  { r:[16,128,86,62], label:"stairs, going down",
    tap:()=>{ if(has("flashlit")) A.go("basement","Step by step, your light carving a little room out of the dark.");
      else if(has("flashlight")) A.say("You click the flashlight. Dry snap. Dead. The dark below doesn't move.");
      else A.say("The stairs go down into perfect black. Something hums under the building. You'd need light."); },
    use:{ flashlit:()=>A.go("basement","Step by step, your light carving a little room out of the dark."),
          flashlight:()=>A.say("Click. Click. Nothing. It needs a battery.") } }
]},

basement:{ hotspots:[
  { r:[0,60,26,120], label:"stairs, back up", tap:()=>A.go("stairwell","Up, toward the ordinary dark instead of the real one.") },
  { r:[42,66,30,50], label:"a breaker panel",
    tap:()=>{ if(!F("power")){ A.set("power"); A.say("You pull the lever. Somewhere above, the building inhales. Lights buzz awake through the floor."); }
      else A.say("The lever is up. The building is awake.",true); } },
  { r:[212,48,66,126], label:"an old door",
    tap:()=>{ if(F("coopOpen")) A.go("coop","The door swings inward on straw-smelling dark.");
      else if(!F("eggPlaced")) A.say("An old wooden door. In its center: an egg-shaped hollow, worn smooth by hands. From beyond it — a soft, patient clucking.");
      else A.say("The stone egg sits in its hollow. Beneath it, a small keyhole, newly revealed."); },
    use:{ stoneegg:()=>{ if(F("eggPlaced")) A.wrong(); else { A.take("stoneegg"); A.set("eggPlaced"); A.say("The stone egg settles into the hollow like it grew there. Click. A keyhole slides open beneath it."); } },
      brasskey:()=>{ if(!F("eggPlaced")) A.say("There's nowhere to put a key. Only the egg-shaped hollow.");
        else if(F("coopOpen")) A.wrong();
        else { A.take("brasskey"); A.set("coopOpen"); A.say("The brass key turns twice. Beyond the door, the clucking stops — listening."); } },
      crowbar:()=>A.say("The door doesn't budge. It's not the kind of door you force.") } }
]},

field:{ hotspots:[
  { r:[8,84,36,78], label:"a grey door, standing alone",
    tap:()=>{ A.set("shortcut"); A.go("hallway","A grey office door, alone in the grass. It opens onto the hallway. Of course it does."); } },
  { r:[298,60,22,120], label:"east, a worn path", tap:()=>A.go("path","An overgrown path. It remembers feet.") },
  { r:[252,128,14,32], label:"something against the tower leg", vis:()=>!F("crowbarTaken"),
    tap:()=>{ A.set("crowbarTaken"); A.give("crowbar","A crowbar, leaning against the tower's leg like someone just set it down."); } },
  { r:[226,20,76,110], label:"the water tower", tap:()=>A.say("The water tower says nothing. Its ladder starts twenty feet up.",true) },
  { r:[116,150,12,9], label:"a small white thing", vis:()=>!F("featherTaken"),
    tap:()=>{ A.set("featherTaken"); A.give("feather","A single white feather. Warm, somehow."); } },
  { r:[148,166,38,14], label:"a drain grate",
    tap:()=>A.say(F("keyFished")?"A rusted grate. Just water-sound below now.":"A rusted grate in the grass. Far below, past any reach of fingers, something small glints."),
    use:{ tool:()=>{ if(F("keyFished")) A.wrong(); else { A.set("keyFished"); A.give("brasskey","You lower the magnet on its twine. A soft tick. You reel up a small brass key."); } },
      magnet:()=>A.say("The magnet's willing, but your arm is three feet too short. You'd need to lower it somehow."),
      string:()=>A.say("The twine dangles uselessly. Nothing on the end to catch with."),
      crowbar:()=>A.say("The grate lifts an inch. The glint is much, much farther down than that.") } }
]},

path:{ hotspots:[
  { r:[0,60,22,120], label:"west, back to the field", tap:()=>A.go("field","The field. The tower. The door in the grass.") },
  { r:[136,38,48,44], label:"north, deeper in", tap:()=>A.go("clearing","The trees open into a clearing, quiet as a held breath.") },
  { r:[248,164,72,36], label:"downhill, toward the road", tap:()=>A.go("roadside","The trees thin. A road, and the last of the light.") },
  { r:[206,92,20,10], label:"something on a branch", vis:()=>!F("stringTaken"),
    tap:()=>{ A.set("stringTaken"); A.give("string","A length of twine, wound around a low branch by patient hands."); } },
  { r:[40,80,60,80], label:"the trees", tap:()=>A.say("The trees lean together like they were talking about you.",true) }
]},

clearing:{ hotspots:[
  { r:[0,184,320,16], label:"south, back to the path", tap:()=>A.go("path","Back on the path. The light hasn't changed. It never changes.") },
  { r:[58,74,24,50], label:"marks on a tree", tap:()=>A.say("Egg shapes carved into the bark, old and healed-over. The same as the office walls.") },
  { r:[138,138,40,20], label:"a fire pit", tap:()=>A.say("Cold ashes, ringed with river stones. Someone waited here a long time.",true) },
  { r:[184,148,44,20], label:"a flat stone",
    tap:()=>{ if(!F("rockMoved")) A.say("A flat stone, half-swallowed by moss. Scratched into its face: a small egg.");

    use:{ crowbar:()=>{ if(F("rockMoved")) A.wrong(); else { A.set("rockMoved"); A.say("The stone levers up with a wet sigh."); } } } }
]},

roadside:{ hotspots:[
  { r:[0,40,26,120], label:"back up the path", tap:()=>A.go("path","Uphill, into the trees, away from the road that goes nowhere twice.") },
  { r:[54,74,40,80], label:"a bus stop sign", tap:()=>A.say("A bus stop. The schedule is a grid of empty boxes.") },
  { r:[192,162,12,9], label:"something catching the light", vis:()=>!F("coinTaken"),
    tap:()=>{ A.set("coinTaken"); A.give("coin","A coin, catching the very last of the light. Someone's fare, once."); } },
  { r:[0,140,320,36], label:"the road", tap:()=>A.say("The road goes both ways to the same nowhere.",true) }
]},

coop:{ hotspots:[
  { r:[0,184,320,16], label:"back through the door", tap:()=>A.go("basement","Back into the basement. The hum. The waiting.") },
  { r:[180,96,80,60], label:"the roost",
    tap:()=>{ if(!F("chickenOut")) A.say("Straw. Warm air. Two small eyes catch your light — then tuck away behind the roost.");

/* ================= renderer ============================================ */
const W=320,H=200;
const cv=document.getElementById("cv"), ctx=cv.getContext("2d");
const img=ctx.createImageData(W,H), buf=new Uint32Array(img.data.buffer);
function C(h){const n=parseInt(h.slice(1),16);return (0xff000000|((n&0xff)<<16)|(n&0xff00)|(n>>>16))>>>0;}
const PAL={}; for(const p in PALETTES){ PAL[p]={}; for(const k in PALETTES[p]) PAL[p][k]=C(PALETTES[p][k]); }
const B4=[[0,8,2,10],[12,4,14,6],[3,11,1,9],[15,7,13,5]];
function P(x,y,c){ if(x>=0&&x<W&&y>=0&&y<H) buf[y*W+x]=c; }
function R(x,y,w,h,c){ for(let j=y;j<y+h;j++)for(let i=x;i<x+w;i++)P(i,j,c); }
/* dithered rect: mix 0..16 of c2 over c1; pass 0 as a color to leave those pixels untouched */
function D(x,y,w,h,c1,c2,m){ for(let j=y;j<y+h;j++)for(let i=x;i<x+w;i++){const c=B4[j&3][i&3]<m?c2:c1; if(c)P(i,j,c);} }
/* dithered vertical gradient c1(top)->c2(bottom) */
function GV(x,y,w,h,c1,c2){ for(let j=0;j<h;j++){const m=Math.round(16*(j+.5)/h);for(let i=x;i<x+w;i++)P(i,y+j,B4[(y+j)&3][i&3]<m?c2:c1);} }
function GH(x,y,w,h,c1,c2){ for(let i=0;i<w;i++){const m=Math.round(16*(i+.5)/w);for(let j=y;j<y+h;j++)P(x+i,j,B4[j&3][(x+i)&3]<m?c2:c1);} }
function SPR(x,y,rows,scale){ scale=scale||1; for(let j=0;j<rows.length;j++)for(let i=0;i<rows[j].length;i++){const ch=rows[j][i],hxc=ICOLORS[ch]; if(hxc)R(x+i*scale,y+j*scale,scale,scale,C(hxc));} }

  /* bus sign */ R(72,86,4,68,p.SN); R(56,76,34,24,p.SN); D(56,76,34,24,p.SN,p.DR,5);
  for(let j=80;j<96;j+=4)for(let i=60;i<86;i+=6)R(i,j,4,2,p.DR); /* empty grid */
  D(70,154,40,5,0,p.DR,8); /* long shadow */
  /* coin */ if(!F("coinTaken")){ P(196,166,p.YL); P(197,166,p.YL); P(196,167,p.YL);
    if(((t>>2)&7)<2){ P(197,165,p.WH); P(195,167,p.WH);} }
},

coop(t){ const p=PAL.dark;
  R(0,0,W,H,p.BK);
  for(let j=40;j<200;j++){ const w2=Math.round((j-40)*0.7)+8; const m=Math.max(1,6-Math.floor((j-40)/40)); D(160-w2,j,w2*2,1,p.BK,p.DS,m); }
  /* straw floor */ D(60,150,200,50,p.BK,p.DS,6); D(90,160,140,40,p.DS,p.ST,5);
  for(let i=0;i<26;i++){ const sx=80+(i*29)%170, sy=155+(i*13)%40; P(sx,sy,p.WM); P(sx+1,sy,p.ST); }
  /* roost */ R(180,120,80,4,p.DS); R(188,124,4,40,p.DS); R(244,124,4,40,p.DS);
  D(176,96,90,28,p.BK,p.DS,3);
  if(F("chickenOut")){ const bob=((t>>2)&1); SPR(146,128+bob,CHICKEN,3);
    /* scattered corn */ for(let i=0;i<10;i++)P(130+(i*17)%80,180+(i*7)%12,C("#e6c46a")); }
  else if(((t>>3)&7)===2){ P(216,110,p.CY); P(222,110,p.CY); }
  /* door behind */ D(120,188,80,12,p.BK,p.DG,4);
},

ending(t){ const p=PAL.dark;
  R(0,0,W,H,p.BK);
  /* dithered halo */ for(let rr=5;rr>0;rr--){ const rad=rr*22;
    for(let j=-rad;j<=rad;j++)for(let i=-rad;i<=rad;i++){ if(i*i+j*j<=rad*rad){ const x=160+i,y=96+j;
      if(B4[y&3][x&3]<(6-rr)) P(x,y,p.DS); } } }
  const bob=((t>>2)&1); SPR(160-24,96-24+bob,CHICKEN,4);
  D(0,170,W,30,p.BK,p.DS,2);
}
};

/* ================= draw loop =========================================== */
let t=0, dirty=true;
setInterval(()=>{ t++; drawFrame(); }, 90);
function drawFrame(){
  (S.won?SCENES.ending:SCENES[S.area])(t);
  ctx.putImageData(img,0,0);
}

/* ================= input =============================================== */
function canvasXY(ev){ const r=cv.getBoundingClientRect();
  return [ Math.floor((ev.clientX-r.left)/r.width*W), Math.floor((ev.clientY-r.top)/r.height*H) ]; }
/* smallest matching hotspot wins, so tiny pickups sit safely inside big zones */
function spotAt(x,y){ let best=null, bestArea=Infinity;
  for(const h of AREAS[S.area].hotspots){ if(h.vis&&!h.vis())continue;
    const [rx,ry,rw,rh]=h.r;
    if(x>=rx&&x<rx+rw&&y>=ry&&y<ry+rh && rw*rh<bestArea){ best=h; bestArea=rw*rh; } }
  return best; }

cv.addEventListener("pointermove",ev=>{ if(S.won)return; const [x,y]=canvasXY(ev); const h=spotAt(x,y);
  document.getElementById("hint").innerHTML=h?("&#8250; "+h.label):"&nbsp;";
  cv.classList.toggle("hot",!!h); });

cv.addEventListener("pointerdown",ev=>{ ev.preventDefault(); ensureAudio(); if(S.won)return;
  const [x,y]=canvasXY(ev); const h=spotAt(x,y);
  if(!h){ if(S.sel){ S.sel=null; renderInv(); A.say("You put it away.",true); }
    else { const fl=FLAVOR[S.area]||[]; if(fl.length)A.say(fl[Math.floor(Math.random()*fl.length)],true); } return; }
  document.getElementById("hint").innerHTML="&nbsp;";
  if(S.sel){ const it=S.sel;
    if(h.use&&h.use[it]){ h.use[it](); S.sel=null; renderInv(); }
    else { A.say("The "+ITEMS[it].name+" isn't what this wants.",true); S.sel=null; renderInv(); }
  } else if(h.tap) h.tap();
});

/* ================= inventory UI ======================================== */
function iconCanvas(id){ const c=document.createElement("canvas"); c.width=12; c.height=12;
  const x=c.getContext("2d"); const rows=ICONS[id]||[];
  for(let j=0;j<rows.length;j++)for(let i=0;i<rows[j].length;i++){ const col=ICOLORS[rows[j][i]];
    if(col){ x.fillStyle=col; x.fillRect(i,j,1,1);} } return c; }
function renderInv(){ const el=document.getElementById("inv"); el.innerHTML="";
  for(const id of S.inv){ const d=document.createElement("div"); d.className="slot"+(S.sel===id?" sel":"");
    d.dataset.name=ITEMS[id].name; d.appendChild(iconCanvas(id));
    d.addEventListener("pointerdown",ev=>{ ev.preventDefault(); ev.stopPropagation(); onItemTap(id); });
    el.appendChild(d); } }
function onItemTap(id){
  if(S.sel===null){ S.sel=id; A.say(ITEMS[id].name+".",true); renderInv(); return; }
  if(S.sel===id){ S.sel=null; renderInv(); return; }
  const a=S.sel,b=id;
  for(const [x,y,res,msgTxt] of COMBOS){ if((a===x&&b===y)||(a===y&&b===x)){
    A.take(a); A.take(b); A.give(res,msgTxt); return; } }
  A.say("They don't fit together.",true); S.sel=null; renderInv();
}

/* ================= ambient audio (WebAudio, off by default) ============ */
let AC=null, soundOn=false, humGain=null, windGain=null, cluckTimer=null;
function ensureAudio(){ if(!soundOn||AC)return;
  try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return; }
  /* fluorescent hum */
  const o1=AC.createOscillator(), o2=AC.createOscillator(); o1.type="sawtooth"; o2.type="sine";
  o1.frequency.value=100; o2.frequency.value=200.3;
  const hf=AC.createBiquadFilter(); hf.type="lowpass"; hf.frequency.value=420;
  humGain=AC.createGain(); humGain.gain.value=0;
  o1.connect(hf); o2.connect(hf); hf.connect(humGain); humGain.connect(AC.destination);
  o1.start(); o2.start();
  /* wind: looped filtered noise */
  const len=2*AC.sampleRate, nb=AC.createBuffer(1,len,AC.sampleRate), d=nb.getChannelData(0);
  let v=0; for(let i=0;i<len;i++){ v=v*0.98+(Math.random()*2-1)*0.05; d[i]=v; }
  const ns=AC.createBufferSource(); ns.buffer=nb; ns.loop=true;
  const wf=AC.createBiquadFilter(); wf.type="lowpass"; wf.frequency.value=380;
  windGain=AC.createGain(); windGain.gain.value=0;
  ns.connect(wf); wf.connect(windGain); windGain.connect(AC.destination); ns.start();
  setAmbience();
}
function cluck(vol){ if(!AC)return; const t0=AC.currentTime;
  for(let i=0;i<2+Math.floor(Math.random()*3);i++){ const st=t0+i*0.18+Math.random()*0.05;
    const o=AC.createOscillator(); o.type="square";
    o.frequency.setValueAtTime(340+Math.random()*60,st); o.frequency.exponentialRampToValueAtTime(240,st+0.09);
    const g=AC.createGain(); g.gain.setValueAtTime(0.0001,st);
    g.gain.exponentialRampToValueAtTime(vol,st+0.02); g.gain.exponentialRampToValueAtTime(0.0001,st+0.11);
    o.connect(g); g.connect(AC.destination); o.start(st); o.stop(st+0.13); } }
function setAmbience(){ if(!AC||!humGain)return;
  const office=["hallway","breakroom","cubicles","stairwell","basement"].includes(S.area);
  const nature=["field","path","clearing","roadside"].includes(S.area);
  humGain.gain.setTargetAtTime(office?(F("power")?0.012:0.005):(S.area==="coop"?0.003:0),AC.currentTime,0.8);
  windGain.gain.setTargetAtTime(nature?0.05:0,AC.currentTime,1.2);
  clearInterval(cluckTimer); cluckTimer=null;
  if(S.area==="basement"||S.area==="coop"||S.won){
    cluckTimer=setInterval(()=>{ if(Math.random()<0.5)cluck(S.area==="basement"?0.015:0.05); },7000); }
}
document.getElementById("sndBtn").addEventListener("click",()=>{
  soundOn=!soundOn; document.getElementById("sndBtn").innerHTML="&#9834; "+(soundOn?"on":"off");
  if(soundOn){ ensureAudio(); if(AC&&AC.state==="suspended")AC.resume(); setAmbience(); }
  else if(AC){ humGain.gain.setTargetAtTime(0,AC.currentTime,0.2); windGain.gain.setTargetAtTime(0,AC.currentTime,0.2);
    clearInterval(cluckTimer); cluckTimer=null; } });

/* ================= reset / restart ===================================== */
function hardReset(){ store.removeItem(SAVE_KEY); S=DEFAULT_STATE();
  document.getElementById("end").classList.remove("show");
  A.say("The lights are on. Nobody said anything about it.",true);
  renderInv(); save(); setAmbience(); }
document.getElementById("rstBtn").addEventListener("click",()=>{ if(confirm("Forget everything and start over?"))hardReset(); });
document.getElementById("againBtn").addEventListener("click",hardReset);

/* ================= boot ================================================ */
load();
renderInv();
if(S.won) document.getElementById("end").classList.add("show");
drawFrame();
</script>
