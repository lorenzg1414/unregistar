<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FORM P-03 — Dream Journal</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:Didot,"Bodoni MT","Playfair Display",Georgia,"Times New Roman",serif;
    background:#ece1cb; min-height:100vh; padding:40px 14px; color:#3d3226;
    display:flex; flex-direction:column; align-items:center;
  }
  .sheet {
    width:100%; max-width:660px; background:#f7f0e0;
    border:1px solid #8e1b1b; outline:4px solid #f7f0e0; outline-offset:0;
    box-shadow:0 0 0 5px #f7f0e0, 0 0 0 6px #8e1b1b, 0 12px 30px rgba(61,42,20,0.25);
    padding:54px 60px 40px; margin:6px;
  }
  .eyebrow { text-align:center; font-size:9px; letter-spacing:5px; color:#8e1b1b; margin-bottom:14px; }
  h1 { text-align:center; font-size:40px; font-weight:normal; font-style:italic; color:#2e2418; letter-spacing:1px; }
  .ornament { text-align:center; color:#8e1b1b; font-size:16px; margin:14px 0 34px; letter-spacing:6px; }
  .ornament::before, .ornament::after { content:"\2014\2014\2014"; color:#c9a97e; font-size:11px; vertical-align:middle; }
  .meta { display:flex; gap:36px; margin-bottom:34px; }
  .meta div { flex:1; }
  .meta label { display:block; font-size:9px; letter-spacing:3px; color:#8e6f4e; margin-bottom:7px; }
  .meta input { width:100%; border:none; border-bottom:1px solid #c9a97e; background:transparent;
    font:inherit; font-size:15px; font-style:italic; color:#3d3226; padding:3px 1px; outline:none; }
  .lucidity { margin-bottom:34px; }
  .lucidity label { font-size:9px; letter-spacing:3px; color:#8e6f4e; margin-right:16px; }
  .lucidity input { display:none; }
  .lucidity span {
    display:inline-block; width:26px; height:26px; border:1px solid #8e1b1b; border-radius:50%;
    text-align:center; line-height:24px; font-size:11px; color:#8e1b1b; margin-right:8px; cursor:pointer;
  }
  .lucidity input:checked + span { background:#8e1b1b; color:#f7f0e0; }
  h2 { font-size:10px; font-weight:normal; letter-spacing:4px; color:#8e1b1b; margin:30px 0 4px; }
  .lines {
    width:100%; border:none; background:transparent; resize:none; outline:none;
    font:inherit; font-size:15px; font-style:italic; color:#3d3226; line-height:34px;
    background-image:repeating-linear-gradient(transparent, transparent 33px, #d9c4a1 33px, #d9c4a1 34px);
    padding:0 1px;
  }
  .quote { text-align:center; font-style:italic; font-size:13px; color:#8e1b1b; margin-top:36px; }
  .bureau { text-align:center; margin-top:18px; font-size:8px; letter-spacing:2px; color:#bda88a;
    font-family:"Courier New",monospace; }
  .no-print { margin-top:24px; display:flex; gap:10px; }
  .no-print button, .no-print a {
    font-family:inherit; font-size:12px; letter-spacing:2px; font-style:italic;
    color:#f7f0e0; background:#8e1b1b; border:none; padding:10px 26px; cursor:pointer; text-decoration:none;
  }
  .no-print a { background:transparent; color:#8e1b1b; border:1px solid #8e1b1b; }
  @media print {
    body { background:#fff; padding:0; }
    .sheet { box-shadow:none; margin:0; max-width:none; }
    .no-print { display:none; }
  }
</style>
</head>
<body>
  <div class="sheet">
    <canvas class="logo" width="44" height="44" style="display:block;margin:0 auto 12px;image-rendering:pixelated;"></canvas>
    <div class="eyebrow">FORM P-03 &mdash; NOCTURNAL PHENOMENA LOG</div>
    <h1>Dream Journal</h1>
    <div class="ornament">&nbsp;&#10086;&nbsp;</div>
    <div class="meta">
      <div><label>DATE OF SLEEP</label><input type="text"></div>
      <div><label>HOUR OF WAKING</label><input type="text"></div>
    </div>
    <div class="lucidity">
      <label>LUCIDITY</label>
      <label><input type="radio" name="lu"><span>I</span></label>
      <label><input type="radio" name="lu"><span>II</span></label>
      <label><input type="radio" name="lu"><span>III</span></label>
      <label><input type="radio" name="lu"><span>IV</span></label>
      <label><input type="radio" name="lu"><span>V</span></label>
    </div>
    <h2>THE DREAM</h2>
    <textarea class="lines" rows="8"></textarea>
    <h2>SYMBOLS OBSERVED</h2>
    <textarea class="lines" rows="3"></textarea>
    <h2>INTERPRETATION, PROVISIONAL</h2>
    <textarea class="lines" rows="3"></textarea>
    <div class="quote">All dreams remain unregistered.</div>
    <div class="bureau">ISSUED BY UNREGISTAR &mdash; ENTIRELY UNNECESSARY &mdash; FOR PRIVATE USE ONLY</div>
  </div>
  <div class="no-print">
    <button onclick="window.print()">Print / Save as PDF</button>
    <a href="../">Bureau Portal</a>
  </div>
<script>
(function(){
  var c=document.querySelector('canvas.logo'), x=c.getContext('2d');
  var N=24, S=c.width/N, img=new Image();
  img.onload=function(){
    var o=document.createElement('canvas'); o.width=N; o.height=N;
    var g=o.getContext('2d'); g.drawImage(img,0,0,N,N);
    var d=g.getImageData(0,0,N,N).data;
    x.fillStyle='#8e1b1b';
    for(var r=0;r<N;r++)for(var i=0;i<N;i++){var k=(r*N+i)*4;
      if((d[k]+d[k+1]+d[k+2])/3<150) x.fillRect(i*S,r*S,S,S);}
  };
  img.src='../assets/star-96.png';
})();
</script>
</body>
</html>
