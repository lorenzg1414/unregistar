<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {

    background:#eceae5; min-height:100vh; padding:40px 14px; color:#111111;
    display:flex; flex-direction:column; align-items:center;
  }
  .sheet { width:100%; max-width:660px; background:#ffffff; border:1px solid #111111; padding:48px 52px 34px; }
  .masthead { border-bottom:3px solid #111; padding-bottom:14px; margin-bottom:8px; text-align:center; }
  h1 { font-size:34px; font-weight:normal; letter-spacing:2px; text-transform:uppercase; }
  .sub { text-align:center; font-size:9px; letter-spacing:4px; color:#8a8a84; font-family:Arial,sans-serif; margin:10px 0 6px; }
  .hint { text-align:center; font-size:13px; font-style:italic; color:#4a4a44; margin-bottom:26px; }
  .entry { border-top:1px solid #ddddd7; padding:14px 0 10px; }
  .erow { display:flex; gap:20px; margin-bottom:8px; }
  .erow > div { flex:1; }
  label { display:block; font-size:8px; letter-spacing:3px; color:#8a8a84; font-family:Arial,sans-serif; margin-bottom:3px; }
  input[type="text"] { width:100%; border:none; border-bottom:1px solid #cfcfc9; background:transparent;
    font:inherit; font-size:14px; font-style:italic; color:#111; padding:3px 1px; outline:none; }
  input[type="text"]:focus { border-bottom-color:#111; }
  .stars { display:flex; gap:4px; align-items:center; }
  .stars input { display:none; }
  .stars span { font-size:18px; color:#d8d8d2; cursor:pointer; font-family:Arial,sans-serif; }
  .stars input:checked + span { color:#b08d2e; }
  .verdict { border-top:3px double #111; margin-top:16px; padding-top:14px; }
  .quote { text-align:center; font-style:italic; font-size:12px; color:#8a8a84; margin-top:22px; }
  .bureau { text-align:center; margin-top:12px; font-size:8px; letter-spacing:2px; color:#c9c9c3; font-family:"Courier New",monospace; }
  .no-print { margin-top:22px; display:flex; gap:10px; }
  .no-print button, .no-print a {
    font-family:Arial,sans-serif; font-size:10px; letter-spacing:3px; color:#fff; background:#111;
    border:none; padding:12px 26px; cursor:pointer; text-decoration:none;
  }
  .no-print a { background:#fff; color:#111; border:1px solid #111; }
  @media print {
    body { background:#fff; padding:0; }
    .sheet { border:none; max-width:none; }
    .no-print { display:none; }

<script>
(function(){
  var c=document.querySelector('canvas.logo'), x=c.getContext('2d');
  var img=new Image();
  img.onload=function(){
    var N=96, o=document.createElement('canvas'); o.width=N; o.height=N;
    var g=o.getContext('2d'); g.drawImage(img,0,0,N,N);
    var id=g.getImageData(0,0,N,N), d=id.data;
    var R=0x11,G=0x11,B=0x11;
    for(var i=0;i<d.length;i+=4){
      var a=255-(d[i]+d[i+1]+d[i+2])/3;
      d[i]=R; d[i+1]=G; d[i+2]=B; d[i+3]=Math.max(0,Math.min(255,a*1.15));
    }
    g.putImageData(id,0,0);
    x.imageSmoothingEnabled=true; x.imageSmoothingQuality='high';
    x.drawImage(o,0,0,c.width,c.height);
  };
  img.src='../assets/star-96.png';
})();
