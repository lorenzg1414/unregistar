<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FORM P-08 — Signs &amp; Synchronicities Log</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:"Courier New",Courier,monospace;
    background:#0c1028; min-height:100vh; padding:38px 14px; color:#cfd6ff;
    display:flex; flex-direction:column; align-items:center;
  }
  .sheet {
    width:100%; max-width:660px; background:#131a3f;
    border:1px solid #3b4a8c; box-shadow:0 0 40px rgba(126,224,210,0.10);
    padding:42px 46px 30px; position:relative;
  }
  .moon { position:absolute; top:18px; right:22px; font-size:20px; color:#7ee0d2; opacity:0.8; }
  h1 { font-size:22px; letter-spacing:3px; color:#7ee0d2; font-weight:normal; }
  .sub { font-size:9px; letter-spacing:4px; color:#5a6ab5; margin:8px 0 4px; }
  .hint { font-size:12px; color:#8f9bd9; margin-bottom:24px; }
  .types { display:flex; gap:14px; flex-wrap:wrap; margin-bottom:24px; font-size:11px; }
  .types label { display:flex; align-items:center; gap:6px; cursor:pointer; color:#8f9bd9; }
  .types input { appearance:none; -webkit-appearance:none; width:14px; height:14px;
    border:1px solid #7ee0d2; background:transparent; cursor:pointer; }
  .types input:checked { background:#7ee0d2; box-shadow:0 0 8px rgba(126,224,210,0.7); }
  .log { border-top:1px dashed #3b4a8c; padding:10px 0; }
  .lrow { display:flex; gap:14px; margin-bottom:6px; }
  label.f { display:block; font-size:8px; letter-spacing:3px; color:#5a6ab5; margin-bottom:3px; }
  input[type="text"] { width:100%; border:none; border-bottom:1px solid #2b3560; background:transparent;
    font:inherit; font-size:13px; color:#cfd6ff; padding:3px 1px; outline:none; }
  input[type="text"]:focus { border-bottom-color:#7ee0d2; }
  .quote { text-align:center; font-size:11px; color:#5a6ab5; margin-top:26px; letter-spacing:1px; }
  .bureau { text-align:center; margin-top:12px; font-size:8px; letter-spacing:2px; color:#39437a; }
  .no-print { margin-top:22px; display:flex; gap:10px; }
  .no-print button, .no-print a {
    font-family:inherit; font-size:11px; letter-spacing:2px; color:#0c1028; background:#7ee0d2;
    border:none; padding:11px 22px; cursor:pointer; text-decoration:none;
  }
  .no-print a { background:transparent; color:#7ee0d2; border:1px solid #7ee0d2; }
  @media print {
    body { background:#fff; padding:0; }
    .no-print { display:none; }
  }
</style>

<script>
(function(){
  var c=document.querySelector('canvas.logo'), x=c.getContext('2d');
  var img=new Image();
  img.onload=function(){
    var N=96, o=document.createElement('canvas'); o.width=N; o.height=N;
    var g=o.getContext('2d'); g.drawImage(img,0,0,N,N);
    var id=g.getImageData(0,0,N,N), d=id.data;
    var R=0x7e,G=0xe0,B=0xd2;
    for(var i=0;i<d.length;i+=4){
      var a=255-(d[i]+d[i+1]+d[i+2])/3;
      d[i]=R; d[i+1]=G; d[i+2]=B; d[i+3]=Math.max(0,Math.min(255,a*1.15));
    }
    g.putImageData(id,0,0);
    x.imageSmoothingEnabled=true; x.imageSmoothingQuality='high';
    x.drawImage(o,0,0,c.width,c.height);
  };
  img.src='../assets/star-96.png';
})();
</script>
